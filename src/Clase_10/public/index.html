<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Cinema Dashboard</title>
    <style>
        :root {
            --bg-color: #141414;
            --text-color: #fff;
            --accent-color: #e50914; /* Netflix Red */
            --card-bg: #2f2f2f;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        button:hover {
            background-color: #b20710;
        }

        /* Grid de películas */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            transition: transform 0.2s;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .movie-meta {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            background-color: #555;
        }

        .btn-delete {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        /* Formulario Simple */
        .form-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: none; /* Oculto por defecto */
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #333;
            border: 1px solid #444;
            color: white;
            box-sizing: border-box;
        }

        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>CINEMA</h1>
    <button onclick="toggleForm()">+ Add Movie</button>
</header>

<div class="form-container" id="movieFormContainer">
    <h2 id="formTitle">Add New Movie</h2>
    <input id="movieId" type="hidden">
    <label for="title">Title</label>
    <input id="title" placeholder="Title" required type="text">

    <label for="director">Director</label>
    <input id="director" placeholder="Director" required type="text">

    <label for="release_year">Release Year</label>
    <input id="release_year" placeholder="Release Year" required type="number">

    <label for="genre">Genre</label>
    <input id="genre" placeholder="Genre" required type="text">
    <button onclick="saveMovie()">Save</button>
    <button onclick="toggleForm()" style="background-color: #555;">Cancel</button>
</div>

<div class="movies-grid" id="moviesGrid">
</div>

<script>
    const API_URL = '/api/movies';

    // Cargar películas al inicio
    document.addEventListener('DOMContentLoaded', fetchMovies);

    async function fetchMovies() {
        const res = await fetch(API_URL);
        const movies = await res.json();
        const grid = document.getElementById('moviesGrid');
        grid.innerHTML = '';

        movies.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-meta">${movie.release_year} | ${movie.genre} <br> Dir: ${movie.director}</div>
                    <div class="card-actions">
                        <button class="btn-edit" onclick="editMovie(${movie.id}, '${movie.title}', '${movie.director}', ${movie.release_year}, '${movie.genre}')">Edit</button>
                        <button class="btn-delete" onclick="deleteMovie(${movie.id})">Delete</button>
                    </div>
                `;
            grid.appendChild(card);
        });
    }

    async function saveMovie() {
        const id = document.getElementById('movieId').value;
        const movie = {
            title: document.getElementById('title').value,
            director: document.getElementById('director').value,
            release_year: document.getElementById('release_year').value,
            genre: document.getElementById('genre').value
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(movie)
        });

        toggleForm(false);
        await fetchMovies();
    }

    async function deleteMovie(id) {
        if (confirm('Are you sure you want to delete this movie?')) {
            await fetch(`${API_URL}/${id}`, {method: 'DELETE'});
            await fetchMovies();
        }
    }

    function editMovie(id, title, director, year, genre) {
        document.getElementById('movieId').value = id;
        document.getElementById('title').value = title;
        document.getElementById('director').value = director;
        document.getElementById('release_year').value = year;
        document.getElementById('genre').value = genre;
        document.getElementById('formTitle').innerText = 'Edit Movie';
        document.getElementById('movieFormContainer').style.display = 'block';
    }

    function toggleForm(forceClose = false) {
        const form = document.getElementById('movieFormContainer');
        if (forceClose || form.style.display === 'block') {
            form.style.display = 'none';
            document.getElementById('movieId').value = '';
            document.getElementById('title').value = '';
            document.getElementById('director').value = '';
            document.getElementById('release_year').value = '';
            document.getElementById('genre').value = '';
            document.getElementById('formTitle').innerText = 'Add New Movie';
        } else {
            form.style.display = 'block';
        }
    }
</script>
</body>
</html>
