services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server1
      - server2
    networks:
      - final2B

  server1:
    build: .
    container_name: server1
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - final2B

  server2:
    build: .
    container_name: server2
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - final2B

  db:
    image: mysql:latest
    container_name: db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mi-vol:/var/lib/mysql
      - ./src/main/resources/static/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./src/main/resources/static/script.sql:/docker-entrypoint-initdb.d/script.sql:ro
    networks:
      - final2B
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  final2B:
    name: final2B
    driver: bridge

volumes:
  mi-vol: