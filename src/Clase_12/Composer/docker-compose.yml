version: '3'
services:
  nginx:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - alpha
      - beta
      - omega

  alpha:
    image: httpd:alpine
    volumes:
      - ./alpha:/usr/local/apache2/htdocs/
  beta:
    image: httpd:alpine
    volumes:
      - ./beta:/usr/local/apache2/htdocs/
  omega:
    image: httpd:alpine
    volumes:
      - ./omega:/usr/local/apache2/htdocs/
